name: Discord Main Push

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  notify:
    name: Notify Discord
    runs-on: ubuntu-latest
    env:
      SERVICE_NAME: Front
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
    steps:
      - name: Send push summary
        uses: actions/github-script@v7
        with:
          script: |
            const webhookUrl = process.env.DISCORD_WEBHOOK_URL;
            if (!webhookUrl) {
              core.setFailed('DISCORD_WEBHOOK_URL secret is not set.');
              return;
            }

            const payload = context.payload;
            const repository = payload.repository;
            const repoName = repository?.full_name || `${context.repo.owner}/${context.repo.repo}`;
            const repoUrl = repository?.html_url || `https://github.com/${repoName}`;
            const branch = (payload.ref || '').replace('refs/heads/', '');
            const commits = payload.commits || [];
            const pusher = payload.pusher?.name || context.actor;
            const actor = payload.sender?.login || context.actor;
            const before = payload.before ? payload.before.slice(0, 7) : 'unknown';
            const after = payload.after ? payload.after.slice(0, 7) : 'unknown';

            const truncate = (value, max) => {
              if (!value) return '';
              return value.length > max ? `${value.slice(0, max - 3)}...` : value;
            };

            const commitLines = commits.slice(0, 10).map((commit) => {
              const sha = (commit.id || '').slice(0, 7);
              const message = truncate((commit.message || '').split('\n')[0], 140);
              const author = commit.author?.name || 'unknown';
              const committer = commit.committer?.name || author;
              const people = author === committer ? author : `${author}, committed by ${committer}`;
              return `[\`${sha}\`](${commit.url}) ${message} - ${people}`;
            });

            if (commits.length > 10) {
              commitLines.push(`...and ${commits.length - 10} more commits`);
            }

            const description = truncate(
              commitLines.length ? commitLines.join('\n') : 'No commit details were included in this push event.',
              3900
            );

            const response = await fetch(webhookUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                username: 'CoWork GitHub',
                allowed_mentions: { parse: [] },
                embeds: [
                  {
                    title: `${process.env.SERVICE_NAME} main push`,
                    url: payload.compare || repoUrl,
                    description,
                    color: 0x2563eb,
                    fields: [
                      { name: 'Repository', value: `[${repoName}](${repoUrl})`, inline: true },
                      { name: 'Branch', value: branch || 'main', inline: true },
                      { name: 'Commits', value: String(commits.length), inline: true },
                      { name: 'Pusher', value: pusher, inline: true },
                      { name: 'Actor', value: actor, inline: true },
                      { name: 'Range', value: `\`${before}..${after}\``, inline: true },
                    ],
                    timestamp: new Date().toISOString(),
                  },
                ],
              }),
            });

            if (!response.ok) {
              const errorBody = await response.text();
              core.setFailed(`Discord webhook failed: ${response.status} ${errorBody}`);
            }
